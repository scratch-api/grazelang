name: "TODOs as issues"
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      issues: write
      pull-requests: write 
    steps:
      - uses: "actions/checkout@v6"
      - name: "TODO to issue"
        uses: "alstr/todo-to-issue-action@v5"
        with:
          INSERT_ISSUE_URLS: "true"
          CLOSE_ISSUES: "true"
          AUTO_ASSIGN: "true"
          ESCAPE: "false"
          
      - name: Commit issue urls
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: append issue URLs to TODOs" || echo "No changes to commit"
          git push